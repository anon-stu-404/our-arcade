<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Battleship · Rizwan & Anha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe9f4, #ffe0f0);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .game-container {
            background: rgba(255, 245, 250, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 3rem;
            padding: 2rem;
            box-shadow: 0 30px 50px -20px #ffa5c0;
            border: 1px solid #ffc0d5;
            max-width: 700px;
            width: 100%;
        }
        h2 { text-align: center; color: #b3407a; margin-bottom: 1rem; }
        .phase-indicator {
            text-align: center;
            font-size: 1.3rem;
            margin: 1rem 0;
            background: #fff0f7;
            padding: 0.7rem;
            border-radius: 60px;
        }
        .boards {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            margin: 1rem 0;
        }
        .board {
            text-align: center;
        }
        .board h3 { color: #a05a7a; margin-bottom: 0.5rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            background: #b0d0ff;
            padding: 10px;
            border-radius: 20px;
        }
        .cell {
            aspect-ratio: 1;
            background: #d0e0ff;
            border-radius: 8px;
            border: 1px solid #5080b0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .cell.ship {
            background: #a0c0f0;
        }
        .cell.hit {
            background: #ff8888;
        }
        .cell.miss {
            background: #cccccc;
        }
        .controls {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            margin: 1rem 0;
        }
        .btn {
            background: #ffb7cf;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid white;
        }
        .btn.active {
            background: #d45a9a;
            box-shadow: 0 0 10px #ff80b5;
        }
        .back-btn {
            background: #ffb7cf;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            margin-top: 1rem;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h2>🚢 Battleship</h2>
        <div class="phase-indicator" id="phaseDisplay">Placement phase</div>

        <div class="boards" id="boardsContainer"></div>

        <div class="controls" id="placementControls">
            <button class="btn" id="shipSize3">Ship size 3</button>
            <button class="btn" id="shipSize2">Ship size 2</button>
            <button class="btn" id="toggleOrientation">Orientation: horizontal</button>
            <button class="btn" id="clearShips">Clear</button>
            <button class="btn" id="donePlacing">Done</button>
        </div>

        <button class="back-btn" id="backBtn">← Back to Arcade</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const player = params.get('player')?.toLowerCase();
        const room = params.get('room') || 'love';

        if (player !== 'rizwan' && player !== 'anha') {
            alert('Invalid player');
            window.location.href = '/';
        }

        const socket = io();
        socket.emit('join', { room, player });

        let gameState = null;
        let currentShips = []; // during placement: array of { positions: [{r,c}] }
        let currentShipSize = 3;
        let orientation = 'horizontal'; // 'horizontal' or 'vertical'
        let placed = false;

        // Helper to check if a position is free
        function isFree(pos) {
            return !currentShips.some(ship =>
                ship.positions.some(p => p.r === pos.r && p.c === pos.c)
            );
        }

        function tryAddShip(size) {
            // We need to find a valid placement based on orientation and current ships
            // For simplicity, we'll let the player click cells to place. We'll implement click handler.
            // We'll store the cells clicked in order. Not trivial in text. Instead, we'll use a drag-free approach:
            // Player clicks first cell, then we try to place ship starting from that cell in chosen orientation.
            // We'll implement that in the grid click handler.
        }

        function renderPlacement() {
            let html = '<div class="board"><h3>Your Ships</h3><div class="grid" id="placementGrid">';
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    let occupied = currentShips.some(ship =>
                        ship.positions.some(p => p.r === r && p.c === c)
                    );
                    html += `<div class="cell ${occupied ? 'ship' : ''}" data-r="${r}" data-c="${c}"></div>`;
                }
            }
            html += '</div></div>';
            document.getElementById('boardsContainer').innerHTML = html;
            document.getElementById('phaseDisplay').innerText = 'Place your ships (3-length and 2-length)';

            // Attach click handlers
            document.querySelectorAll('#placementGrid .cell').forEach(cell => {
                cell.addEventListener('click', () => {
                    if (placed) return;
                    const r = parseInt(cell.dataset.r);
                    const c = parseInt(cell.dataset.c);
                    // Try to place ship of currentShipSize starting at (r,c) in current orientation
                    let positions = [];
                    for (let i = 0; i < currentShipSize; i++) {
                        let nr = r + (orientation === 'vertical' ? i : 0);
                        let nc = c + (orientation === 'horizontal' ? i : 0);
                        if (nr > 4 || nc > 4) return; // out of bounds
                        positions.push({ r: nr, c: nc });
                    }
                    // Check if all positions free
                    if (positions.every(pos => isFree(pos))) {
                        currentShips.push({ positions });
                        renderPlacement(); // re-render
                    }
                });
            });
        }

        function renderBattle() {
            const opponent = player === 'rizwan' ? 'anha' : 'rizwan';
            const myBoard = gameState.boards[player];
            const oppBoard = gameState.boards[opponent];
            let html = `
                <div class="board"><h3>Your Board</h3><div class="grid" id="myBoard">`;
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    let cellClass = 'cell';
                    if (myBoard.hits[r][c] === 'hit') cellClass += ' hit';
                    else if (myBoard.hits[r][c] === 'miss') cellClass += ' miss';
                    else {
                        // show ship if it's there (for own board)
                        let isShip = myBoard.ships.some(ship =>
                            ship.positions.some(p => p.r === r && p.c === c)
                        );
                        if (isShip) cellClass += ' ship';
                    }
                    html += `<div class="${cellClass}" data-r="${r}" data-c="${c}"></div>`;
                }
            }
            html += `</div></div>
                <div class="board"><h3>Opponent Board</h3><div class="grid" id="oppBoard">`;
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    let cellClass = 'cell';
                    if (oppBoard.hits[r][c] === 'hit') cellClass += ' hit';
                    else if (oppBoard.hits[r][c] === 'miss') cellClass += ' miss';
                    html += `<div class="${cellClass}" data-r="${r}" data-c="${c}"></div>`;
                }
            }
            html += `</div></div>`;
            document.getElementById('boardsContainer').innerHTML = html;

            let phaseText = gameState.winner ? (gameState.winner === 'anha' ? 'Anha wins! ♡' : 'Rizwan wins!') : (gameState.turn === player ? 'Your turn' : "Opponent's turn");
            document.getElementById('phaseDisplay').innerText = phaseText;

            // Attach attack handlers
            if (!gameState.winner && gameState.turn === player) {
                document.querySelectorAll('#oppBoard .cell').forEach(cell => {
                    cell.addEventListener('click', () => {
                        const r = parseInt(cell.dataset.r);
                        const c = parseInt(cell.dataset.c);
                        socket.emit('gameMove', { type: 'attack', r, c });
                    });
                });
            }
        }

        socket.on('init', (data) => {
            if (data.currentGame && data.currentGame.name === 'battleship') {
                gameState = data.currentGame.state;
                if (gameState.phase === 'placement') {
                    if (gameState.placed[player]) {
                        placed = true;
                        // wait for opponent
                        document.getElementById('boardsContainer').innerHTML = '<div style="text-align:center">Waiting for opponent to place ships...</div>';
                        document.getElementById('placementControls').style.display = 'none';
                    } else {
                        renderPlacement();
                    }
                } else {
                    renderBattle();
                }
            } else {
                socket.emit('startGame', 'battleship');
            }
        });

        socket.on('gameStarted', (game) => {
            if (game.name === 'battleship') {
                gameState = game.state;
                renderPlacement();
            }
        });

        socket.on('gameUpdate', (state) => {
            gameState = state;
            if (gameState.phase === 'placement') {
                if (gameState.placed[player]) {
                    placed = true;
                    document.getElementById('boardsContainer').innerHTML = '<div style="text-align:center">Waiting for opponent to place ships...</div>';
                    document.getElementById('placementControls').style.display = 'none';
                } else {
                    renderPlacement();
                }
            } else {
                renderBattle();
            }
        });

        socket.on('gameEnded', () => {
            window.location.href = '/?player=' + player + '&room=' + room;
        });

        // Controls
        document.getElementById('shipSize3').addEventListener('click', () => {
            currentShipSize = 3;
            document.getElementById('shipSize3').classList.add('active');
            document.getElementById('shipSize2').classList.remove('active');
        });
        document.getElementById('shipSize2').addEventListener('click', () => {
            currentShipSize = 2;
            document.getElementById('shipSize2').classList.add('active');
            document.getElementById('shipSize3').classList.remove('active');
        });
        document.getElementById('toggleOrientation').addEventListener('click', (e) => {
            orientation = orientation === 'horizontal' ? 'vertical' : 'horizontal';
            e.target.innerText = `Orientation: ${orientation}`;
        });
        document.getElementById('clearShips').addEventListener('click', () => {
            currentShips = [];
            renderPlacement();
        });
        document.getElementById('donePlacing').addEventListener('click', () => {
            // Validate: exactly two ships, sizes 3 and 2
            if (currentShips.length !== 2) {
                alert('You need to place both ships (size 3 and 2)');
                return;
            }
            const sizes = currentShips.map(s => s.positions.length).sort();
            if (sizes[0] !== 2 || sizes[1] !== 3) {
                alert('Ships must be of length 3 and 2');
                return;
            }
            socket.emit('gameMove', { type: 'place', ships: currentShips });
            placed = true;
            document.getElementById('placementControls').style.display = 'none';
            document.getElementById('boardsContainer').innerHTML = '<div style="text-align:center">Waiting for opponent...</div>';
        });

        document.getElementById('backBtn').addEventListener('click', () => {
            socket.emit('leaveGame');
        });
    </script>
</body>
</html>
