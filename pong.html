<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Pong · Rizwan & Anha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe9f4, #ffe0f0);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .game-container {
            background: rgba(255, 245, 250, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 3rem;
            padding: 2rem;
            box-shadow: 0 30px 50px -20px #ffa5c0;
            border: 1px solid #ffc0d5;
            max-width: 900px;
            width: 100%;
        }
        h2 { text-align: center; color: #b3407a; margin-bottom: 1rem; }
        .score {
            display: flex;
            justify-content: center;
            gap: 3rem;
            font-size: 2rem;
            background: #fff0f7;
            padding: 0.7rem;
            border-radius: 60px;
            margin: 1rem 0;
        }
        .canvas-wrapper {
            background: #1a1a2e;
            border-radius: 30px;
            padding: 10px;
        }
        canvas {
            width: 100%;
            height: auto;
            background: #16213e;
            border-radius: 20px;
            touch-action: none;
            display: block;
        }
        .back-btn {
            background: #ffb7cf;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            margin-top: 1rem;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h2>🏓 Pong</h2>
        <div class="score" id="scoreDisplay">Rizwan 0 : 0 Anha</div>
        <div class="canvas-wrapper">
            <canvas id="pongCanvas" width="800" height="400"></canvas>
        </div>
        <button class="back-btn" id="backBtn">← Back to Arcade</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const player = params.get('player')?.toLowerCase();
        const room = params.get('room') || 'love';

        if (player !== 'rizwan' && player !== 'anha') {
            alert('Invalid player');
            window.location.href = '/';
        }

        const socket = io();
        socket.emit('join', { room, player });

        let gameState = null;
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrame;

        socket.on('init', (data) => {
            if (data.currentGame && data.currentGame.name === 'pong') {
                gameState = data.currentGame.state;
            } else {
                socket.emit('startGame', 'pong');
            }
        });

        socket.on('gameStarted', (game) => {
            if (game.name === 'pong') {
                gameState = game.state;
            }
        });

        socket.on('gameUpdate', (state) => {
            gameState = state;
        });

        socket.on('gameEnded', () => {
            cancelAnimationFrame(animationFrame);
            window.location.href = '/?player=' + player + '&room=' + room;
        });

        function draw() {
            if (!gameState) return;
            ctx.clearRect(0, 0, 800, 400);

            // Draw paddles
            ctx.fillStyle = 'white';
            ctx.fillRect(10, gameState.paddles.rizwan, 10, gameState.paddleHeight);
            ctx.fillRect(780, gameState.paddles.anha, 10, gameState.paddleHeight);

            // Draw ball
            ctx.beginPath();
            ctx.arc(gameState.ball.x, gameState.ball.y, 8, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffb7cf';
            ctx.fill();

            // Update score display
            document.getElementById('scoreDisplay').innerText = `Rizwan ${gameState.scores.rizwan} : ${gameState.scores.anha} Anha`;

            animationFrame = requestAnimationFrame(draw);
        }
        draw();

        // Paddle control
        function handlePaddleMove(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleY = canvas.height / rect.height;
            let clientY;
            if (e.touches) {
                clientY = e.touches[0].clientY;
            } else {
                clientY = e.clientY;
            }
            const y = (clientY - rect.top) * scaleY;
            socket.emit('gameMove', { type: 'movePaddle', y });
        }

        canvas.addEventListener('mousemove', handlePaddleMove);
        canvas.addEventListener('touchmove', handlePaddleMove, { passive: false });

        document.getElementById('backBtn').addEventListener('click', () => {
            socket.emit('leaveGame');
        });
    </script>
</body>
</html>
