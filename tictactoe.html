<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Tic Tac Toe · Rizwan & Anha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe9f4, #ffe0f0);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .game-container {
            background: rgba(255, 245, 250, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 3rem;
            padding: 2rem;
            box-shadow: 0 30px 50px -20px #ffa5c0;
            border: 1px solid #ffc0d5;
            max-width: 500px;
            width: 100%;
        }
        h2 { text-align: center; color: #b3407a; margin-bottom: 1rem; }
        .turn-indicator {
            text-align: center;
            font-size: 1.5rem;
            margin: 1rem 0;
            background: #fff0f7;
            padding: 0.7rem;
            border-radius: 60px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            aspect-ratio: 1;
            margin: 1rem 0;
        }
        .cell {
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 500;
            box-shadow: 0 8px 0 #ffb0c0;
            border: 2px solid #ffb0d0;
            cursor: pointer;
            transition: 0.1s;
            aspect-ratio: 1;
        }
        .cell:active { transform: translateY(4px); box-shadow: 0 4px 0 #ffb0c0; }
        .cell.X { color: #a55a7a; }
        .cell.O { color: #4a7a9a; }
        .cell.win { background: #ffe0b0; }
        .back-btn {
            background: #ffb7cf;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            margin-top: 1rem;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h2>❌⭕ Tic Tac Toe</h2>
        <div class="turn-indicator" id="turnDisplay">Loading...</div>
        <div class="board" id="board"></div>
        <button class="back-btn" id="backBtn">← Back to Arcade</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const player = params.get('player')?.toLowerCase();
        const room = params.get('room') || 'love';

        if (player !== 'rizwan' && player !== 'anha') {
            alert('Invalid player');
            window.location.href = '/';
        }

        const socket = io();
        socket.emit('join', { room, player });

        let gameState = null;

        socket.on('init', (data) => {
            if (data.currentGame && data.currentGame.name === 'tictactoe') {
                gameState = data.currentGame.state;
                render();
            } else {
                // No active game, start one
                socket.emit('startGame', 'tictactoe');
            }
        });

        socket.on('gameStarted', (game) => {
            if (game.name === 'tictactoe') {
                gameState = game.state;
                render();
            }
        });

        socket.on('gameUpdate', (state) => {
            gameState = state;
            render();
        });

        socket.on('gameEnded', () => {
            window.location.href = '/?player=' + player + '&room=' + room;
        });

        function render() {
            if (!gameState) return;
            const boardDiv = document.getElementById('board');
            let html = '';
            for (let i = 0; i < 9; i++) {
                const value = gameState.board[i] || '';
                const winClass = (gameState.winningLine && gameState.winningLine.includes(i)) ? 'win' : '';
                html += `<div class="cell ${value} ${winClass}" data-index="${i}">${value}</div>`;
            }
            boardDiv.innerHTML = html;

            let turnText = '';
            if (gameState.winner) {
                if (gameState.winner === 'X') turnText = 'Anha wins! ♡';
                else if (gameState.winner === 'O') turnText = 'Rizwan wins!';
                else turnText = 'Draw';
            } else {
                turnText = gameState.turn === 'X' ? "Anha's turn" : "Rizwan's turn";
            }
            document.getElementById('turnDisplay').innerText = turnText;

            document.querySelectorAll('.cell').forEach(cell => {
                cell.addEventListener('click', () => {
                    if (gameState.winner) return;
                    const index = cell.dataset.index;
                    if (gameState.board[index] !== null) return;
                    const expectedTurn = player === 'anha' ? 'X' : 'O';
                    if (gameState.turn !== expectedTurn) return;
                    socket.emit('gameMove', { index: parseInt(index) });
                });
            });
        }

        document.getElementById('backBtn').addEventListener('click', () => {
            socket.emit('leaveGame');
        });
    </script>
</body>
</html>
